name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  deployments: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Debug - List files
      run: |
        echo "Current directory:"
        pwd
        echo "Files in current directory:"
        ls -la
        echo "Checking for hugo.toml:"
        ls -la hugo.toml 2>/dev/null || echo "hugo.toml not found in root"
        ls -la mydocs/hugo.toml 2>/dev/null || echo "hugo.toml not found in mydocs"

    - name: Setup Hugo
      uses: peaceiris/actions-hugo@v3
      with:
        hugo-version: '0.156.0'
        extended: true

    - name: Build
      run: |
        if [ -f "hugo.toml" ]; then
          echo "Building in root directory"
          hugo --minify
        elif [ -f "mydocs/hugo.toml" ]; then
          echo "Building in mydocs directory"
          cd mydocs
          hugo --minify
        else
          echo "hugo.toml not found!"
          exit 1
        fi

    - name: Deploy to Cloudflare Pages
      if: github.ref == 'refs/heads/main'
      uses: cloudflare/pages-action@v1
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        projectName: interview-questions
        directory: public
        gitHubToken: ${{ secrets.GITHUB_TOKEN }}
